# Don't print a new line at the start of the prompt
add_newline = false

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:#5f5f6d'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#89b4fa)"
error_symbol = "[пҖҚ пҒӢ](bold fg:#f38ba8)"

[package]
disabled = true

[git_branch]
style = "bg:#313244"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:#313244)[$symbol $branch(:$remote_branch)](fg:#cdd6f4 bg:#313244)[оӮҙ ](bold fg:#313244)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:#45475a bold fg:#cdd6f4)[оӮҙ](bold fg:#45475a)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed fg:#94e2d5"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#89b4fa fg:#1e1e2e"
style_root = "red bold"
format = "[оӮ¶](bold fg:#89b4fa)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#313244 fg:#cdd6f4"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:#313244)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:#313244)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#fab387)[у°Әў $duration](bold bg:#fab387 fg:#1e1e2e)[оӮҙ](bold fg:#fab387)'