# ╔══════════════════════════════════════════════════════════════╗
# ║          HYPRLOCK — CELESTIAL SHADE THEME BRIDGE             ║
# ║    Auto-syncs with whatever palette is currently active.     ║
# ╚══════════════════════════════════════════════════════════════╝

source = ~/.config/hypr/themes/artifact/theme.conf

general {
    ignore_empty_input = true
    hide_cursor        = true
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BACKGROUND
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
background {
    monitor     =
    path        = $HOME/.config/hypr/themes/wallpapers/.current_image
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.60
    contrast    = 0.90
    vibrancy    = 0.20
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AVATAR
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
image {
    monitor      =
    path         = $HOME/Pictures/Useful/alishlockscreen.png
    size         = 260
    rounding     = -1
    border_size  = 3
    border_color = $primary $secondary 90deg
    rotate       = 0
    reload_time  = 0
    position     = 0, 220
    halign       = center
    valign       = center
    shadow_passes = 8
    shadow_size   = 18
    shadow_color  = 0xaa000000
    shadow_boost  = 1.5
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PASSWORD INPUT FIELD
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
input-field {
    monitor    =
    size       = 220, 52

    dots_size    = 0.30
    dots_spacing = 0.15
    dots_center  = true
    dots_rounding = -1

    inner_color = $bg_base
    font_color  = $fg_text
    outer_color = $primary
    check_color = $primary
    fail_color  = $error

    font_family = Rubik Medium

    outline_thickness = 2
    rounding          = 12
    fade_on_empty     = true
    fade_timeout      = 800
    fail_transition   = 0

    placeholder_text  = <i>Password...</i>
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>

    hide_input       = false
    capslock_color   = $accent
    numlock_color    = -1
    bothlock_color   = -1
    invert_numlock   = false
    swap_font_color  = false

    position = 0, -20
    halign   = center
    valign   = center

    shadow_passes = 8
    shadow_size   = 16
    shadow_color  = 0xaa000000
    shadow_boost  = 1.5
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CLOCK
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor    =
    text       = cmd[update:1000] echo "$TIME"
    color      = $primary
    font_size  = 70
    font_family = Rubik Black
    position   = -50, 20
    halign     = right
    valign     = bottom
    shadow_passes = 5
    shadow_size   = 10
    shadow_color  = 0xaa000000
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DATE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor    =
    text       = cmd[update:60000] date +"%A, %B %d"
    color      = $secondary
    font_size  = 18
    font_family = Rubik Medium
    position   = -50, 110
    halign     = right
    valign     = bottom
    shadow_passes = 4
    shadow_size   = 8
    shadow_color  = 0xaa000000
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# USERNAME
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor    =
    text       =   ALISH_25474
    color      = $fg_text
    font_size  = 30
    font_family = Rubik ExtraBold
    position   = 0, 47
    halign     = center
    valign     = center
    shadow_passes = 4
    shadow_size   = 8
    shadow_color  = 0xaa000000
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HINT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor    =
    text       = HOPE
    color      = $text_color
    font_size  = 12
    font_family = Rubik Light
    position   = 0, -70
    halign     = center
    valign     = center
    shadow_passes = 0
    shadow_size   = 0
    shadow_color  = 0x88000000
}